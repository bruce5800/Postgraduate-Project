title: |
  在线二部匹配中预测的局限性：一项统一实验研究与一个不可能性定理
author: |
  [作者姓名] —— 硕士学位论文（草稿）
documentclass: ctexrep
classoption:
  - UTF8
  - fontset=macnew
geometry: margin=1in
linkcolor: black
abstract: |
  面向在线二部匹配的学习增强（"带预测"）算法近年大量涌现：MinPredictedDegree 消费一个逐节点的度数
  预测，而一族"测试-回退"（test-and-fallback）方案则在提交"跟随预测"或"回退到免预测基线"之前，先在
  亚线性长度的到达前缀上对类型直方图预测进行检验。这些算法此前均被孤立地研究。本文给出首个统一实验
  研究，将它们置于同一套评测框架下——采用共同的结构化预测误差模型、共同的最优解、以及置信区间——并
  跨越合成图、六个真实世界图与真实请求 trace 进行比较。我们的核心发现是：在平均情况输入上，预测的
  价值是鲁棒性保险，而非性能杠杆——免预测基线本已近乎最优，好建议的一致性上升空间很小；而无防护地
  跟随预测在坏预测下会崩到远低于基线，成熟算法的实际价值恰恰在于它们从不如此。随后我们证明这堵墙是
  必然的：任何仅在亚线性前缀上做检验的测试-回退算法，在强基线实例上都无法同时兼具一致性与鲁棒性，
  因为使前缀分布检验可行的结构，恰恰是使基线近乎最优的结构。该证明将"安全使用建议"归约到容差分布
  检验，并援引其近线性的样本复杂度壁垒。实验与理论共同给出一句话：能检验建议的地方，就不需要它。
